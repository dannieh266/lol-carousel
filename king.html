<script>
    var skinImgDom = document.querySelectorAll(".list img") // 获取小图
    var skinSpanDom = document.querySelectorAll(".list span")   // 获取绿框
    var curIndex = 0    // 共用下标

    // 初始化
    skinImgDom[0].style.opacity = "1"
    skinSpanDom[0].style.display = "inline-block"

    // 封装函数：用于轮播图的清除和添加样式
    function clear_add(previousIndex, nextIndex) {
        // 清除之前的激活样式
        skinSpanDom[previousIndex].style.display = "none"
        skinImgDom[previousIndex].style.opacity = ".75"
        // 移动火车
        var imgBanner = document.querySelector('.pic')
        imgBanner.style.transform = `translateX(-${nextIndex * 1239}px`
        // 绿框
        skinSpanDom[nextIndex].style.display = "inline-block"
        // 透明度
        skinImgDom[nextIndex].style.opacity = "1"
        // 角色名
        var intro = document.querySelector('.hero-name span')
        intro.innerText = skinImgDom[previousIndex].title
    }

    // 自动轮播功能
    function autoLoop() {
        var usedIndex = curIndex
        curIndex = curIndex === skinImgDom.length - 1 ? 0 : curIndex + 1
        clear_add(usedIndex, curIndex)
    }
    var timer = setInterval(autoLoop, 3000)

    // 导航图的点击事件
    skinImgDom.forEach(function (ele, index) {
        ele.onclick = function () {
            // 清除定时器
            clearInterval(timer)
            clear_add(curIndex, index)
            curIndex = index
            timer = setInterval(autoLoop, 3000)
        }
    })


    // 2023/10/5 更新记录
    // 1、导航图的点击事件更新：使用模板字符串
    // 2、减少因定时器导致的额外变量
    // 3、封装一个复用量大的函数精简代码
    // 4、通过消除定时器来解决点击事件与定时器的冲突，而不是通过if
    // 特别：老师使用一个变量，三元表达式 让它等于小图.length的时候赋值为0，否则继续加1（注意+1会错），这样就不用判断是否大于12了

    // 2023/9/29 更新记录
    // 1、<将大图的切换方式更改为火车盒子移动切换>
    // 2、<给轮播图增加自动轮播效果>

    // 点击后的图片opacity和边框在点击别的图片时会被取消active，因此只能通过js实现
    // <如何实现点击后，1小图亮+2边框+3大图更改>
    // 1、小图被点击时单独加opacity。
    //    当被取消激活效果，则获取小图list，循环重置。
    // 2、获取小图边框list，被点击时display改下。
    //    当被取消激活样式时，循环控制display
    // 3、获取大图地址，当小图被点击时，把大图src改了
    // 4、关于取消激活样式，onclick之前都要进行一次opacity和display的重置


</script>
